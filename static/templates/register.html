{% extends 'base.html' %}
{% block title %}Student Registration - Smart Attendance System{% endblock %}
{% block header_title %}Student Registration{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="login-container w-100" style="max-width: 600px;">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 48px;"></i>
            <h2 class="mt-3 font-weight-bold">Register Profile</h2>
            <p class="text-muted">Create your secure student account</p>
        </div>
        <form action="{{ url_for('auth.register') }}" method="POST" class="d-flex flex-column gap-3">
            <input type="hidden" name="role" value="student">
            
            <div class="row">
                <div class="col-md-6">
                    <label for="name" class="form-label text-secondary">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="col-md-6">
                    <label for="email" class="form-label text-secondary">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="john.doe@college.edu">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="student_id" class="form-label text-secondary">Student ID</label>
                    <input type="text" class="form-control" id="student_id" name="student_id" required placeholder="STU10012">
                </div>
                <div class="col-md-6">
                    <label for="roll_no" class="form-label text-secondary">Roll Number</label>
                    <input type="text" class="form-control" id="roll_no" name="roll_no" required placeholder="42">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label for="class_name" class="form-label text-secondary">Class / Department</label>
                    <input type="text" class="form-control" id="class_name" name="class_name" required placeholder="FY BSc IT">
                </div>
                <div class="col-md-6">
                    <label for="password" class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-premium mt-3">
                <i class="bi bi-check-circle me-2"></i> Submit Registration
            </button>
        </form>
        <div class="text-center mt-4">
            <p class="text-muted mb-0">Already registered? 
                <a href="{{ url_for('auth.login') }}" class="text-primary font-weight-bold text-decoration-none">Log In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
