<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Attendance System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <style>
        .input-group-text-clay {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-right: none;
            border-top-left-radius: 16px;
            border-bottom-left-radius: 16px;
            color: #0f172a;
            box-shadow: inset 3px 3px 6px rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] .input-group-text-clay {
            background: rgba(10, 15, 28, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-right: none;
            color: #f8fafc;
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.3);
        }
        .clay-input-grouped {
            border-top-left-radius: 0px !important;
            border-bottom-left-radius: 0px !important;
        }
    </style>
</head>
<body class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="clay-card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-qr-code-scan text-info" style="font-size: 3.2rem;"></i>
                        <h2 class="mt-3 font-weight-bold text-color">Smart Attendance</h2>
                        <p class="text-muted">Sign in to access your portal</p>
                    </div>
                    <!-- Flash Messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show mb-3" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}
                    <form action="{{ url_for('auth.login') }}" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label text-color">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text input-group-text-clay"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control clay-input clay-input-grouped" id="email" name="email" required placeholder="name@school.com">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-color">Password</label>
                            <div class="input-group">
                                <span class="input-group-text input-group-text-clay"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control clay-input clay-input-grouped" id="password" name="password" required placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" class="btn clay-btn w-100 py-2 mb-3">Sign In</button>
                    </form>
                    <div class="text-center">
                        <span class="text-muted">New Student?</span> 
                        <a href="{{ url_for('auth.register') }}" class="text-info text-decoration-none ms-1 fw-bold">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
